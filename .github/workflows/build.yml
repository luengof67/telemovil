name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestana Actions

permissions:
  contents: write       # necesario para publicar el Release con el APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dependencias
        run: flutter pub get

      - name: Compilar APK (release)
        run: flutter build apk --release

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: telemovil-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publicar en Releases (URL fija para Downloader)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: TeleMovil build ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
